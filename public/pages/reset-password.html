<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%236c63ff%27/%3E%3Ctext x=%2750%27 y=%2768%27 font-size=%2760%27 font-family=%27Arial,sans-serif%27 font-weight=%27700%27 fill=%27white%27 text-anchor=%27middle%27%3EJ%3C/text%3E%3C/svg%3E"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Jobsk</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body{overflow:auto;height:auto}</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo-area">
      <div class="auth-logo-row">
        <div class="logo-box">
          <svg width="34" height="34" viewBox="0 0 36 36">
            <defs><linearGradient id="lgAuth" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#f857a6"/></linearGradient></defs>
            <rect width="36" height="36" rx="10" fill="url(#lgAuth)"/>
            <text x="18" y="25" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="18" fill="white">J</text>
          </svg>
        </div>
        <div class="logo-name">job<span>sk</span></div>
      </div>
      <p>Set a new password</p>
    </div>

    <div class="auth-msg error" id="authError"></div>
    <div class="auth-msg success" id="authSuccess"></div>

    <div class="auth-form">
      <div class="fg">
        <label class="fl">New password</label>
        <input class="fi" type="password" id="newPassword" placeholder="At least 8 characters"/>
      </div>
      <div class="fg">
        <label class="fl">Confirm new password</label>
        <input class="fi" type="password" id="confirmPassword" placeholder="Re-enter password"/>
      </div>
      <button class="auth-submit" onclick="submitReset()">Set new password</button>
      <p style="text-align:center;font-size:12px;color:#94a3b8">
        <a href="login.html" style="color:#6c63ff;cursor:pointer;font-weight:600">← Back to sign in</a>
      </p>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="../js/config.js"></script>
<script>
function showErr(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authSuccess').style.display = 'none';
}
function showOk(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authError').style.display = 'none';
}

function getToken() {
  return new URLSearchParams(window.location.search).get('token');
}

async function submitReset() {
  const token = getToken();
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (!token) { showErr('This reset link is missing its token — please use the link from your email.'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters'); return; }
  if (password !== confirm) { showErr('Passwords do not match'); return; }

  try {
    const res = await fetch(BACKEND_URL + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (data.success) {
      showOk('Password updated! Redirecting to sign in...');
      setTimeout(() => window.location.href = 'login.html', 1200);
    } else {
      showErr(data.message || 'Could not reset password');
    }
  } catch (e) {
    showErr('Could not reach the server. Is the backend running at ' + BACKEND_URL + '?');
  }
}

if (!getToken()) {
  showErr('This page needs a reset token — please use the link from your email.');
}
</script>
</body>
</html>
